<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CakeCraft Tools</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-theme="light">
    <!-- Navbar (Simplified) -->
    <nav class="navbar scrolled" style="position: absolute; background: transparent; border: none; box-shadow: none;">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-birthday-cake"></i> Cake<span>Craft</span>
            </a>
            <div class="nav-actions">
                <button class="icon-btn" id="theme-toggle" aria-label="Toggle Dark Mode">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="auth-page">
        <!-- Left Side Image -->
        <div class="auth-left"></div>
        
        <!-- Right Side Form -->
        <div class="auth-right">
            <div class="auth-box glass fade-up">
                <h2>Welcome Back</h2>
                <p>Sign in to access your wishlist and exclusive baking offers.</p>
                
                <form action="shop.html" method="GET" onsubmit="window.location.href='shop.html'; return false;">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="hello@baker.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    
                    <div class="auth-options">
                        <label style="display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox"> Remember me
                        </label>
                        <a href="#">Forgot Password?</a>
                    </div>
                    
                    <button type="submit" class="btn btn-primary auth-btn">Sign In</button>
                </form>
                
                <div class="auth-footer">
                    Don't have an account? <a href="#">Create Account</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
